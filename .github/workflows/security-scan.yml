name: Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  security-scan:
    name: secagent Security Scan
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      
      - name: Build secagent
        working-directory: ${{ github.workspace }}
        run: |
          pwd
          ls -la
          cd ${{ github.workspace }}
          go mod download
          go build -o secagent ./cmd/secagent
          chmod +x secagent
          sudo mv secagent /usr/local/bin/
      
      - name: Install scanners
        run: |
          # Install osv-scanner
          curl -sSL https://raw.githubusercontent.com/google/osv-scanner/main/install.sh | bash
          
          # Install gitleaks
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 \
            -o /tmp/gitleaks && chmod +x /tmp/gitleaks && sudo mv /tmp/gitleaks /usr/local/bin/
          
          # Install semgrep
          pip install semgrep
          
          # Install trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          
          # Install checkov
          pip install checkov
      
      - name: Run secagent scan
        run: |
          secagent scan --all . --format json --output secagent-results.json
          cat secagent-results.json
      
      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secagent-results
          path: secagent-results.json
          retention-days: 30
      
      - name: Print summary
        if: always()
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          secagent scan --all . 2>&1 | head -50 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
